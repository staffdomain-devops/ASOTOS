name: ASOTOS Campaign Generator

on:
  workflow_dispatch:
    inputs:
      contact_ids:
        description: 'JSON array of HubSpot contact IDs e.g. ["12345","67890"]'
        required: true
        type: string
      contact_emails:
        description: 'JSON array of contact emails (for DLQ/logging) e.g. ["a@b.com","c@d.com"]'
        required: true
        type: string

jobs:
  generate-campaign:
    runs-on: ubuntu-latest
    env:
      CONTACT_IDS: ${{ inputs.contact_ids }}
      CONTACT_EMAILS: ${{ inputs.contact_emails }}
      HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
      CHORUS_API_TOKEN: ${{ secrets.CHORUS_API_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      RUNNER_TEMP: ${{ runner.temp }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch HubSpot contacts
        run: python scripts/fetch_hubspot.py

      - name: Fetch Chorus transcripts
        run: python scripts/fetch_chorus.py

      - name: Compute campaign tokens
        run: python scripts/compute_campaign_tokens.py

      - name: Generate reasoning
        run: python scripts/generate_reasoning.py

      - name: Generate emails
        run: python scripts/generate_emails.py

      - name: Write campaigns to HubSpot
        run: python scripts/write_hubspot.py

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: campaign-output-${{ github.run_id }}
          path: ${{ runner.temp }}/campaign_output.json
          retention-days: 7

      - name: Copy failed contacts log
        if: always()
        run: cp "${{ runner.temp }}/failed_contacts.json" failed_contacts.json 2>/dev/null || echo '[]' > failed_contacts.json

      - name: Upload failure artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-contacts-${{ github.run_id }}
          path: failed_contacts.json
          retention-days: 7

      - name: Notify Teams on failure
        if: failure()
        run: |
          FAIL_COUNT=$(cat "${{ runner.temp }}/failed_contacts.json" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else 1)" 2>/dev/null || echo "?")
          FIRST_ERROR=$(cat "${{ runner.temp }}/failed_contacts.json" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); rec=d[0] if isinstance(d,list) and d else d; print(f\"{rec.get('contact_email','?')} — {rec.get('failed_step','?')}: {rec.get('error_message','')[:200]}\")" 2>/dev/null || echo "see artifact")
          curl -s -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"@context\": \"https://schema.org/extensions\",
              \"summary\": \"ASOTOS pipeline failed\",
              \"themeColor\": \"FF0000\",
              \"title\": \"ASOTOS pipeline failed — ${FAIL_COUNT} contact(s)\",
              \"sections\": [{
                \"facts\": [
                  {\"name\": \"Failed contacts\", \"value\": \"${FAIL_COUNT}\"},
                  {\"name\": \"First error\", \"value\": \"${FIRST_ERROR}\"},
                  {\"name\": \"Run log\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}
                ]
              }]
            }"
